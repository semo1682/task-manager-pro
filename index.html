<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager Pro | Eslam Mesalam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-dark">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="app">
    <section class="task-card">
      <div class="header">
        <div>
          <p class="eyebrow">Productivity App</p>
          <h1>Task Manager Pro</h1>
          <p class="subtext">Plan smarter, organize tasks, and stay productive with a modern workflow.</p>
        </div>

        <button id="themeToggle" class="theme-toggle" type="button">☀️ Light</button>
      </div>

      <form id="taskForm" class="task-form">
        <input type="text" id="taskInput" placeholder="Add a new task..." />

        <select id="priorityInput">
          <option value="Low">Low Priority</option>
          <option value="Medium" selected>Medium Priority</option>
          <option value="High">High Priority</option>
        </select>

        <input type="date" id="dateInput" />

        <button type="submit">Add Task</button>
      </form>

      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" id="searchInput" placeholder="Search tasks..." class="search-input" />

          <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
          </div>
        </div>

        <div class="toolbar-right">
          <button id="clearCompletedBtn" class="clear-btn" type="button">Clear Completed</button>
          <button id="clearAllBtn" class="danger-btn" type="button">Clear All</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat-box">
          <span>Total Tasks</span>
          <strong id="totalTasks">0</strong>
        </div>
        <div class="stat-box">
          <span>Completed</span>
          <strong id="completedTasks">0</strong>
        </div>
        <div class="stat-box">
          <span>Pending</span>
          <strong id="pendingTasks">0</strong>
        </div>
        <div class="stat-box">
          <span>High Priority</span>
          <strong id="highPriorityTasks">0</strong>
        </div>
      </div>

      <p class="message" id="message">Add your first task to get started.</p>

      <ul class="task-list" id="taskList"></ul>
    </section>
  </main>

  <!-- Edit Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3>Edit Task</h3>
        <button id="closeModalBtn" class="modal-close" type="button">✕</button>
      </div>

      <form id="editTaskForm" class="modal-form">
        <input type="text" id="editTaskInput" placeholder="Task title" />

        <select id="editPriorityInput">
          <option value="Low">Low Priority</option>
          <option value="Medium">Medium Priority</option>
          <option value="High">High Priority</option>
        </select>

        <input type="date" id="editDateInput" />

        <div class="modal-actions">
          <button type="button" id="cancelEditBtn" class="ghost-btn">Cancel</button>
          <button type="submit" class="save-btn">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js?v=5"></script>
</body>
</html>
